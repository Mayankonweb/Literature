<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NetML Literature Search</title>
  <meta name="description" content="Search across security, privacy &amp; cryptography conference and journal papers.">
  <meta property="og:title" content="SLS: Security Literature Search">
  <meta property="og:description" content="Full-text search across top security, privacy & cryptography venues">
  <meta property="og:type" content="website">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/style.css">
  <!-- NEW: grouped-filter styles (add this line) -->
  <link rel="stylesheet" href="css/sls-filters.css">
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <a href="./" class="site-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
      </svg>
      NetML
    </a>
    <nav class="site-nav">
      <a href="https://github.com/boardslayer/SLS" target="_blank" rel="noopener">GitHub</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <span id="themeIcon">&#9790;</span>
      </button>
    </nav>
  </header>

  <!-- Hero + Search -->
  <section class="hero">
    <h1>NetML Literature Search</h1>
    <p class="tagline">Full-text search across top Networks, Systems &amp; ML venues</p>
    <div class="search-wrapper">
      <span class="search-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </span>
      <input type="text" class="search-input" id="searchInput"
             placeholder="Search by title, author, or keyword..."
             autocomplete="off" spellcheck="false">
      <div class="suggestions" id="suggestions"></div>
    </div>
    <p class="stats-line" id="statsLine">Loading paper data...</p>
  </section>

  <!-- Filters -->
  <!-- The venue chips and Type menu are rendered by js/filter-ui.js into the
       containers below. The year + sort groups stay as static markup. -->
  <div class="filters-bar" id="filtersBar">
    <!-- Grouped venue dropdowns (Conferences / Journals / …) injected here -->
    <div class="venue-menus" id="venueMenus"></div>

    <span class="filter-sep"></span>

    <div class="filter-group">
      <label for="yearMin">Year</label>
      <input type="number" class="year-input" id="yearMin" placeholder="Min">
      <span>-</span>
      <input type="number" class="year-input" id="yearMax" placeholder="Max">
    </div>

    <span class="filter-sep"></span>

    <!-- Paper-type dropdown injected here -->
    <div class="type-menu" id="typeMenu"></div>

    <span class="filter-sep"></span>

    <div class="filter-group">
      <label for="sortSelect">Sort</label>
      <select class="sort-select" id="sortSelect">
        <option value="relevance">Relevance</option>
        <option value="year-desc">Newest first</option>
        <option value="year-asc">Oldest first</option>
      </select>
    </div>
  </div>

  <!-- Active-selection summary chips (rendered by filter-ui.js) -->
  <div class="active-venues" id="activeVenues"></div>

  <!-- Results -->
  <main class="results-container" id="results">
    <div class="loading-container" id="loadingState">
      <div class="loading-spinner"></div>
      <p>Loading search index...</p>
      <div style="margin-top: 1.5rem">
        <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
        <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
        <div class="skeleton-card"><div class="skeleton-line"></div><div class="skeleton-line"></div><div class="skeleton-line"></div></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <p>
      Paper metadata from <a href="https://dblp.org" target="_blank" rel="noopener">DBLP</a> (CC0) &middot;
      Last updated: <span id="lastUpdated">-</span>
    </p>
  </footer>

  <!-- Scripts -->
  <!-- sql.js-httpvfs: query data/papers.sqlite over HTTP Range (vendored) -->
  <script src="js/vendor/sql.js-httpvfs/index.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/search.js"></script>
  <!-- NEW: builds the grouped venue + type dropdowns; load BEFORE app.js -->
  <script src="js/filter-ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
